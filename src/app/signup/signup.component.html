<div align="center">

    <h1>User Registration</h1>
    <h3>{{form.message}}</h3>

    <form (submit)="Signup()">
        <table>
            <tr>
                <th>First Name</th>
                <td><input type="text" name="firstName" [(ngModel)]="form.data.firstName"
                        placeholder="enter your firstName"></td>
                        <td><span style="color:red" *ngIf="form.inputerror.firstName">{{form.inputerror.firstName}}</span></td>
            </tr>
            <tr>
                <th>Last Name</th>
                <td><input type="text" name="lastName" [(ngModel)]="form.data.lastName"
                        placeholder="enter your lastName"></td>
                        <td><span style="color:red" *ngIf="form.inputerror.lastName">{{form.inputerror.lastName}}</span></td>
            </tr>
            <tr>
                <th>Login</th>
                <td><input type="text" name="loginId" [(ngModel)]="form.data.loginId" placeholder="enter your login">
                </td>
                <td><span style="color:red" *ngIf="form.inputerror.loginId">{{form.inputerror.loginId}}</span></td> 
            </tr>
            <tr>
                <th>Password</th>
                <td><input type="password" name="password" [(ngModel)]="form.data.password"
                        placeholder="enter your password"></td>
                        <td><span style="color:red" *ngIf="form.inputerror.password">{{form.inputerror.password}}</span></td>
            </tr>
            <tr>
                <th>Dob</th>
                <td><input type="date" name="dob" [(ngModel)]="form.data.dob" style="width: 65px;"></td>
                <td><span style="color:red" *ngIf="form.inputerror.dob">{{form.inputerror.dob}}</span></td>
            </tr>
            <tr>
                <th></th>
                <td><input type="submit" value="signUp"></td>
            </tr>
        </table>

    </form>
</div>
